# Orders: sólo acepta de UI y Checkout. NO desde el túnel (sin acceso directo).
# Este es el caso de uso de segmentación (CU-3): un admin/empleado por la VPN
# NO puede alcanzar Orders directamente, aunque sí UI/Catalog.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-orders
  namespace: the-store
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: orders
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ui
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: checkout
      ports:
        - { protocol: TCP, port: 8080 }
