# Gateway WireGuard del cluster.
# Dependencias creadas por vpn/scripts/10-deploy-gateway.sh ANTES de aplicar esto:
#   - Secret  wg-gateway-conf        (wg0.conf, wg1.conf — contienen claves privadas)
#   - ConfigMap wg-gateway-entrypoint (entrypoint.sh)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wg-gateway
  namespace: vpn-system
  labels:
    app: wg-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wg-gateway
  template:
    metadata:
      labels:
        app: wg-gateway
    spec:
      initContainers:
        # /proc/sys/net es read-only con sólo NET_ADMIN. Este init (privilegiado,
        # efímero) habilita ip_forward en el netns del pod; el container principal
        # queda con sólo NET_ADMIN.
        - name: enable-forwarding
          image: tpe-wireguard:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "echo 1 > /proc/sys/net/ipv4/ip_forward"]
          securityContext:
            privileged: true
      containers:
        - name: wg-gateway
          image: tpe-wireguard:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "/opt/gateway/entrypoint.sh"]
          env:
            # Mismos valores que vpn/scripts/lib.sh (fuente única de verdad).
            - { name: C2S_SUBNET, value: "10.200.0.0/24" }
            - { name: S2S_SUBNET, value: "10.100.0.0/30" }
            - { name: SVC_CIDR,   value: "10.96.0.0/16" }
            - { name: POD_CIDR,   value: "10.244.0.0/16" }
          securityContext:
            # Modo kernel: alcanza con NET_ADMIN (no requiere privileged).
            capabilities:
              add: ["NET_ADMIN"]
          ports:
            - { name: s2s, containerPort: 51820, protocol: UDP }
            - { name: c2s, containerPort: 51821, protocol: UDP }
          volumeMounts:
            - { name: wg-conf,    mountPath: /etc/wireguard, readOnly: true }
            - { name: entrypoint, mountPath: /opt/gateway }
          readinessProbe:
            exec:
              command: ["wg", "show", "wg0"]
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: wg-conf
          secret:
            secretName: wg-gateway-conf
        - name: entrypoint
          configMap:
            name: wg-gateway-entrypoint
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: wg-gateway
  namespace: vpn-system
  labels:
    app: wg-gateway
spec:
  type: NodePort
  selector:
    app: wg-gateway
  ports:
    - { name: s2s, port: 51820, targetPort: 51820, nodePort: 31820, protocol: UDP }
    - { name: c2s, port: 51821, targetPort: 51821, nodePort: 31821, protocol: UDP }
